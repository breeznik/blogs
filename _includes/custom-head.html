<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Social Preview — Open Graph + Twitter Card -->
{% assign _title = page.title | default: site.title %}
{% assign _desc  = page.description | default: site.description %}
{% assign _url   = page.url | absolute_url %}
{% if page.image %}{% assign _img = page.image | absolute_url %}{% endif %}

<meta property="og:type"        content="article">
<meta property="og:site_name"   content="{{ site.title | escape }}">
<meta property="og:title"       content="{{ _title | escape }}">
<meta property="og:description" content="{{ _desc | escape }}">
<meta property="og:url"         content="{{ _url }}">
{% if _img %}<meta property="og:image"        content="{{ _img }}">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt"    content="{{ _title | escape }}">{% endif %}

<meta name="twitter:card"        content="{% if _img %}summary_large_image{% else %}summary{% endif %}">
<meta name="twitter:title"       content="{{ _title | escape }}">
<meta name="twitter:description" content="{{ _desc | escape }}">
{% if _img %}<meta name="twitter:image"       content="{{ _img }}">
<meta name="twitter:image:alt"   content="{{ _title | escape }}">{% endif %}
